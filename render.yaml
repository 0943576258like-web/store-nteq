services:
  - type: web
    name: nteq-it-stock
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nteq-db
          property: connectionString

databases:
  - name: nteq-db
    plan: free
    databaseName: nteq_stock
    user: nteq_user
